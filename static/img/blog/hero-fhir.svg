  <!-- Connection lines between hexagons -->
  <line x1="540" y1="270" x2="520" y2="270" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="660" y1="270" x2="680" y2="270" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="540" y1="330" x2="520" y2="390" stroke="url(#grad)" stroke-width="1" opacity="0.35"/>
  <line x1="660" y1="330" x2="680" y2="390" stroke="url(#grad)" stroke-width="1" opacity="0.35"/>
  <line x1="600" y1="360" x2="600" y2="420" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="240" x2="600" y2="220" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
