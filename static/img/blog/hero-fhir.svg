  <line x1="590" y1="300" x2="610" y2="300" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="600" y1="290" x2="600" y2="310" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
