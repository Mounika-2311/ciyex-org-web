  <!-- Surrounding hexagons -->
  <polygon points="460,180 520,210 520,270 460,300 400,270 400,210" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <polygon points="740,180 800,210 800,270 740,300 680,270 680,210" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <polygon points="460,360 520,390 520,450 460,480 400,450 400,390" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <polygon points="740,360 800,390 800,450 740,480 680,450 680,390" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <polygon points="600,420 660,450 660,510 600,540 540,510 540,450" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
  <polygon points="600,100 660,130 660,190 600,220 540,190 540,130" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
