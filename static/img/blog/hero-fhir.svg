  <circle cx="530" cy="270" r="3" fill="url(#grad)" opacity="0.6"/>
  <circle cx="670" cy="270" r="3" fill="url(#grad)" opacity="0.6"/>
  <circle cx="530" cy="360" r="2.5" fill="url(#grad)" opacity="0.5"/>
  <circle cx="670" cy="360" r="2.5" fill="url(#grad)" opacity="0.5"/>
  <circle cx="600" cy="300" r="4" fill="url(#grad)" opacity="0.7"/>
