<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Winding path -->
  <path d="M200 480 Q350 480 400 400 Q450 320 550 320 Q650 320 700 240 Q750 160 900 160 Q1000 160 1050 200" fill="none" stroke="url(#grad)" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <!-- Path shadow/double -->
  <path d="M200 480 Q350 480 400 400 Q450 320 550 320 Q650 320 700 240 Q750 160 900 160 Q1000 160 1050 200" fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.06" stroke-linecap="round"/>
  <!-- Milestone dots -->
  <circle cx="250" cy="475" r="12" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <circle cx="250" cy="475" r="5" fill="url(#grad)" opacity="0.7"/>
  <circle cx="400" cy="400" r="12" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.75"/>
  <circle cx="400" cy="400" r="5" fill="url(#grad)" opacity="0.65"/>
  <circle cx="550" cy="320" r="12" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.7"/>
  <circle cx="550" cy="320" r="5" fill="url(#grad)" opacity="0.6"/>
  <circle cx="700" cy="240" r="14" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <circle cx="700" cy="240" r="6" fill="url(#grad)" opacity="0.7"/>
  <circle cx="900" cy="160" r="14" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.85"/>
  <circle cx="900" cy="160" r="6" fill="url(#grad)" opacity="0.75"/>
  <circle cx="1040" cy="195" r="10" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <circle cx="1040" cy="195" r="4" fill="url(#grad)" opacity="0.5"/>
  <!-- Milestone markers (vertical lines) -->
  <line x1="250" y1="460" x2="250" y2="430" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="385" x2="400" y2="355" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="550" y1="305" x2="550" y2="275" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="223" x2="700" y2="193" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="900" y1="143" x2="900" y2="113" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <!-- Small label boxes at milestones -->
  <rect x="225" y="410" width="50" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <rect x="375" y="335" width="50" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <rect x="525" y="255" width="50" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <rect x="675" y="173" width="50" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <rect x="875" y="93" width="50" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <!-- Arrow at end -->
  <polygon points="1055,195 1045,188 1045,202" fill="url(#grad)" opacity="0.6"/>
  <!-- Background decoration -->
  <line x1="150" y1="530" x2="1100" y2="530" stroke="url(#grad)" stroke-width="0.5" opacity="0.08"/>
  <line x1="150" y1="100" x2="1100" y2="100" stroke="url(#grad)" stroke-width="0.5" opacity="0.08"/>
</svg>