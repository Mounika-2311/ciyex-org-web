<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Person head -->
  <circle cx="600" cy="240" r="45" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <!-- Person body -->
  <path d="M540 330 Q540 300 600 295 Q660 300 660 330 L660 370 L540 370 Z" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.7"/>
  <!-- Data rays emanating outward -->
  <line x1="660" y1="250" x2="780" y2="190" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="290" x2="800" y2="280" stroke="url(#grad)" stroke-width="1.5" opacity="0.45"/>
  <line x1="660" y1="340" x2="780" y2="390" stroke="url(#grad)" stroke-width="1.5" opacity="0.4"/>
  <line x1="630" y1="370" x2="700" y2="460" stroke="url(#grad)" stroke-width="1.5" opacity="0.35"/>
  <line x1="540" y1="250" x2="420" y2="190" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="530" y1="290" x2="400" y2="280" stroke="url(#grad)" stroke-width="1.5" opacity="0.45"/>
  <line x1="540" y1="340" x2="420" y2="390" stroke="url(#grad)" stroke-width="1.5" opacity="0.4"/>
  <line x1="570" y1="370" x2="500" y2="460" stroke="url(#grad)" stroke-width="1.5" opacity="0.35"/>
  <!-- Data endpoint icons (small shapes) -->
  <rect x="770" y="175" width="40" height="30" rx="4" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.5"/>
  <rect x="790" y="265" width="40" height="30" rx="4" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.45"/>
  <circle cx="790" cy="400" r="18" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.4"/>
  <rect x="685" y="448" width="35" height="28" rx="4" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
  <rect x="390" y="175" width="40" height="30" rx="4" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="390" cy="280" r="18" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.45"/>
  <rect x="400" y="378" width="40" height="30" rx="4" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.4"/>
  <circle cx="495" cy="468" r="16" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
  <!-- Small data lines inside endpoint boxes -->
  <line x1="778" y1="185" x2="800" y2="185" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="778" y1="193" x2="795" y2="193" stroke="url(#grad)" stroke-width="1" opacity="0.25"/>
  <line x1="798" y1="273" x2="820" y2="273" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="798" y1="281" x2="815" y2="281" stroke="url(#grad)" stroke-width="1" opacity="0.25"/>
  <!-- Pulse/heartbeat in person -->
  <circle cx="600" cy="240" r="8" fill="url(#grad)" opacity="0.15"/>
  <circle cx="600" cy="240" r="3" fill="url(#grad)" opacity="0.5"/>
</svg>