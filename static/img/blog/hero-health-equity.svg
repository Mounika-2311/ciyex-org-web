<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Scale beam -->
  <line x1="400" y1="250" x2="800" y2="250" stroke="url(#grad)" stroke-width="2.5" opacity="0.7"/>
  <!-- Scale fulcrum/pillar -->
  <line x1="600" y1="250" x2="600" y2="420" stroke="url(#grad)" stroke-width="2.5" opacity="0.7"/>
  <!-- Fulcrum triangle -->
  <polygon points="600,245 585,260 615,260" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.7"/>
  <!-- Base -->
  <line x1="540" y1="420" x2="660" y2="420" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="555" y1="430" x2="645" y2="430" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Left pan -->
  <path d="M380 250 L340 320 Q340 340 400 340 Q460 340 460 320 L420 250" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <!-- Left pan chains -->
  <line x1="400" y1="250" x2="380" y2="250" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="250" x2="420" y2="250" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <!-- Right pan -->
  <path d="M780 250 L740 320 Q740 340 800 340 Q860 340 860 320 L820 250" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <!-- Right pan chains -->
  <line x1="800" y1="250" x2="780" y2="250" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="800" y1="250" x2="820" y2="250" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <!-- People in left pan -->
  <circle cx="380" cy="290" r="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.5"/>
  <line x1="380" y1="300" x2="380" y2="318" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="285" r="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.55"/>
  <line x1="400" y1="295" x2="400" y2="318" stroke="url(#grad)" stroke-width="1" opacity="0.45"/>
  <circle cx="420" cy="290" r="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.5"/>
  <line x1="420" y1="300" x2="420" y2="318" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <!-- People in right pan -->
  <circle cx="780" cy="290" r="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.5"/>
  <line x1="780" y1="300" x2="780" y2="318" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <circle cx="800" cy="285" r="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.55"/>
  <line x1="800" y1="295" x2="800" y2="318" stroke="url(#grad)" stroke-width="1" opacity="0.45"/>
  <circle cx="820" cy="290" r="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.5"/>
  <line x1="820" y1="300" x2="820" y2="318" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <!-- Equal sign above -->
  <line x1="585" y1="195" x2="615" y2="195" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="585" y1="210" x2="615" y2="210" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Radiating lines from center -->
  <line x1="600" y1="180" x2="600" y2="160" stroke="url(#grad)" stroke-width="1" opacity="0.2"/>
  <line x1="580" y1="185" x2="565" y2="165" stroke="url(#grad)" stroke-width="0.8" opacity="0.15"/>
  <line x1="620" y1="185" x2="635" y2="165" stroke="url(#grad)" stroke-width="0.8" opacity="0.15"/>
  <!-- Background decorative circles -->
  <circle cx="300" cy="315" r="3" fill="url(#grad)" opacity="0.12"/>
  <circle cx="900" cy="315" r="3" fill="url(#grad)" opacity="0.12"/>
  <circle cx="600" cy="480" r="3" fill="url(#grad)" opacity="0.1"/>
</svg>