<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Left database (cylinder) -->
  <ellipse cx="320" cy="230" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="230" x2="240" y2="380" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="230" x2="400" y2="380" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="320" cy="380" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="320" cy="280" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="320" cy="330" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.2"/>
  <!-- Fill -->
  <ellipse cx="320" cy="230" rx="75" ry="22" fill="url(#grad)" opacity="0.04"/>
  <!-- Right database (cylinder) -->
  <ellipse cx="880" cy="230" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="800" y1="230" x2="800" y2="380" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="960" y1="230" x2="960" y2="380" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="880" cy="380" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="880" cy="280" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="880" cy="330" rx="80" ry="25" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="880" cy="230" rx="75" ry="22" fill="url(#grad)" opacity="0.06"/>
  <!-- Flowing arrows between databases -->
  <path d="M410 270 Q600 220 790 270" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <polygon points="785,267 795,270 785,273" fill="url(#grad)" opacity="0.6"/>
  <path d="M410 310 Q600 260 790 310" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.45"/>
  <polygon points="785,307 795,310 785,313" fill="url(#grad)" opacity="0.45"/>
  <path d="M410 350 Q600 300 790 350" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
  <polygon points="785,347 795,350 785,353" fill="url(#grad)" opacity="0.35"/>
  <!-- Data particles along arrows -->
  <circle cx="500" cy="255" r="3" fill="url(#grad)" opacity="0.5"/>
  <circle cx="600" cy="245" r="3" fill="url(#grad)" opacity="0.55"/>
  <circle cx="700" cy="258" r="3" fill="url(#grad)" opacity="0.5"/>
  <circle cx="550" cy="280" r="2.5" fill="url(#grad)" opacity="0.4"/>
  <circle cx="650" cy="275" r="2.5" fill="url(#grad)" opacity="0.4"/>
  <!-- Decorative lines -->
  <line x1="280" y1="420" x2="280" y2="460" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="320" y1="420" x2="320" y2="460" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="360" y1="420" x2="360" y2="460" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="840" y1="420" x2="840" y2="460" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="880" y1="420" x2="880" y2="460" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="920" y1="420" x2="920" y2="460" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
</svg>