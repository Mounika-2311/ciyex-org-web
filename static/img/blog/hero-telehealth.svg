<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Monitor frame -->
  <rect x="370" y="130" width="460" height="300" rx="12" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <rect x="380" y="140" width="440" height="280" rx="8" fill="url(#grad)" opacity="0.04"/>
  <!-- Screen bezel -->
  <rect x="395" y="155" width="410" height="250" rx="4" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <!-- Monitor stand -->
  <line x1="600" y1="430" x2="600" y2="480" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="530" y1="480" x2="670" y2="480" stroke="url(#grad)" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <!-- Medical cross on screen -->
  <line x1="575" y1="280" x2="625" y2="280" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="600" y1="255" x2="600" y2="305" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Video call wave circles -->
  <circle cx="600" cy="280" r="40" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="280" r="60" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.2"/>
  <circle cx="600" cy="280" r="80" fill="none" stroke="url(#grad)" stroke-width="0.6" opacity="0.12"/>
  <!-- Signal waves emanating from screen -->
  <path d="M810 220 Q830 240 810 260" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
  <path d="M830 200 Q860 240 830 280" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.25"/>
  <path d="M850 180 Q890 240 850 300" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.15"/>
  <path d="M390 220 Q370 240 390 260" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.35"/>
  <path d="M370 200 Q340 240 370 280" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.25"/>
  <path d="M350 180 Q310 240 350 300" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.15"/>
  <!-- Small camera dot -->
  <circle cx="600" cy="148" r="3" fill="url(#grad)" opacity="0.5"/>
  <!-- Decorative dots -->
  <circle cx="250" cy="200" r="2" fill="url(#grad)" opacity="0.15"/>
  <circle cx="280" cy="350" r="2" fill="url(#grad)" opacity="0.15"/>
  <circle cx="950" cy="200" r="2" fill="url(#grad)" opacity="0.15"/>
  <circle cx="920" cy="350" r="2" fill="url(#grad)" opacity="0.15"/>
</svg>