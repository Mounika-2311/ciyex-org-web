  <path d="M825 358 Q825 345 850 340 Q875 345 875 358 L875 380 L825 380 Z" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <!-- Heart above group -->
  <path d="M575 170 Q575 145 595 145 Q615 145 615 170 Q615 145 635 145 Q655 145 655 170 Q655 200 615 225 Q575 200 575 170 Z" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <path d="M580 172 Q580 150 597 150 Q614 150 614 172 Q614 150 631 150 Q648 150 648 172 Q648 198 614 220 Q580 198 580 172 Z" fill="url(#grad)" opacity="0.06"/>
  <!-- Connection arcs between people -->
  <path d="M490 290 Q530 260 565 285" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <path d="M635 285 Q670 260 710 290" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>
  <path d="M375 330 Q415 300 430 320" fill="none" stroke="url(#grad)" stroke-width="0.6" opacity="0.2"/>
  <path d="M770 320 Q785 300 825 330" fill="none" stroke="url(#grad)" stroke-width="0.6" opacity="0.2"/>
