      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Center person -->
  <circle cx="600" cy="250" r="28" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <path d="M565 310 Q565 290 600 285 Q635 290 635 310 L635 340 L565 340 Z" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
