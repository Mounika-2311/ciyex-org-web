  <path d="M300 350 Q300 180 600 160 Q900 180 900 350" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.15"/>
  <path d="M320 400 Q320 200 600 180 Q880 200 880 400" fill="none" stroke="url(#grad)" stroke-width="0.6" opacity="0.1"/>
  <!-- Ground line -->
  <line x1="280" y1="420" x2="920" y2="420" stroke="url(#grad)" stroke-width="0.8" opacity="0.12"/>
  <!-- Decorative dots -->
  <circle cx="600" cy="420" r="3" fill="url(#grad)" opacity="0.3"/>
  <circle cx="460" cy="420" r="2" fill="url(#grad)" opacity="0.2"/>
  <circle cx="740" cy="420" r="2" fill="url(#grad)" opacity="0.2"/>
</svg>