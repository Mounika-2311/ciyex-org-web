<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Bottom layer -->
  <rect x="350" y="440" width="500" height="60" rx="8" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>
  <rect x="355" y="445" width="490" height="50" rx="5" fill="url(#grad)" opacity="0.05"/>
  <!-- Middle layer -->
  <rect x="380" y="340" width="440" height="60" rx="8" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.5"/>
  <rect x="385" y="345" width="430" height="50" rx="5" fill="url(#grad)" opacity="0.08"/>
  <!-- Upper middle layer -->
  <rect x="410" y="240" width="380" height="60" rx="8" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.7"/>
  <rect x="415" y="245" width="370" height="50" rx="5" fill="url(#grad)" opacity="0.1"/>
  <!-- Top layer -->
  <rect x="440" y="140" width="320" height="60" rx="8" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.9"/>
  <rect x="445" y="145" width="310" height="50" rx="5" fill="url(#grad)" opacity="0.12"/>
  <!-- Vertical connectors -->
  <line x1="500" y1="200" x2="500" y2="240" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="200" x2="600" y2="240" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="700" y1="200" x2="700" y2="240" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="300" x2="480" y2="340" stroke="url(#grad)" stroke-width="1" opacity="0.35"/>
  <line x1="600" y1="300" x2="600" y2="340" stroke="url(#grad)" stroke-width="1" opacity="0.35"/>
  <line x1="720" y1="300" x2="720" y2="340" stroke="url(#grad)" stroke-width="1" opacity="0.35"/>
  <line x1="460" y1="400" x2="460" y2="440" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="400" x2="600" y2="440" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <line x1="740" y1="400" x2="740" y2="440" stroke="url(#grad)" stroke-width="1" opacity="0.3"/>
  <!-- Arrow heads -->
  <polygon points="600,238 596,230 604,230" fill="url(#grad)" opacity="0.4"/>
  <polygon points="600,338 596,330 604,330" fill="url(#grad)" opacity="0.35"/>
  <polygon points="600,438 596,430 604,430" fill="url(#grad)" opacity="0.3"/>
  <!-- Small accent dots on layers -->
  <circle cx="470" cy="170" r="3" fill="url(#grad)" opacity="0.6"/>
  <circle cx="510" cy="170" r="3" fill="url(#grad)" opacity="0.6"/>
  <circle cx="550" cy="170" r="3" fill="url(#grad)" opacity="0.6"/>
  <circle cx="500" cy="270" r="2.5" fill="url(#grad)" opacity="0.5"/>
  <circle cx="540" cy="270" r="2.5" fill="url(#grad)" opacity="0.5"/>
  <circle cx="580" cy="270" r="2.5" fill="url(#grad)" opacity="0.5"/>
  <circle cx="620" cy="270" r="2.5" fill="url(#grad)" opacity="0.5"/>
  <!-- Side decorative lines -->
  <line x1="200" y1="170" x2="350" y2="170" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="270" x2="350" y2="270" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="370" x2="350" y2="370" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="470" x2="350" y2="470" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="850" y1="170" x2="1000" y2="170" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="850" y1="270" x2="1000" y2="270" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="850" y1="370" x2="1000" y2="370" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
  <line x1="850" y1="470" x2="1000" y2="470" stroke="url(#grad)" stroke-width="0.5" opacity="0.15"/>
</svg>